services:
  db:
    image: postgres:18.3-trixie
    restart: unless-stopped
    environment:
      TERM: ${TERM:-xterm}
      PG_COLOR: ${PG_COLOR:-auto}
      POSTGRES_INITDB_ARGS: "${POSTGRES_INITDB_ARGS:--E UTF8 --locale=en_US.UTF-8}"
      POSTGRES_USER: ${FOT_DB_USERNAME:-fot_admin}
      POSTGRES_PASSWORD: "${FOT_DB_PASSWORD:-FOT_DB_PASSWORD123}"
      POSTGRES_DB: ${FOT_DB_DATABASE:-fot_db}
    volumes:
      - "./volumes/storage/postgresql/data:/var/lib/postgresql"
    command: ["-p", "${FOT_DB_PORT:-5432}"]
    tty: true
  api:
    image: bybatkhuu/rest-fastapi-orm-template:4.0.2-260311
    build:
      context: .
    depends_on:
      - db
    restart: unless-stopped
    environment:
      TERM: ${TERM:-xterm}
      TZ: ${TZ:-UTC}
      FOT_DB_HOST: ${FOT_DB_HOST:-db}
      FOT_DB_USERNAME: ${FOT_DB_USERNAME:-fot_admin}
      FOT_DB_PASSWORD: "${FOT_DB_PASSWORD:-FOT_DB_PASSWORD123}"
      FOT_DB_DATABASE: ${FOT_DB_DATABASE:-fot_db}
      FOT_API_PORT: ${FOT_API_PORT:-8000}
    env_file:
      - path: .env
        required: false
    volumes:
      - "./volumes/configs/rest-fastapi-orm-template:${FOT_API_CONFIGS_DIR:-/etc/rest-fastapi-orm-template}"
      - "./volumes/storage/rest-fastapi-orm-template/logs:${FOT_API_LOGS_DIR:-/var/log/rest-fastapi-orm-template}"
      - "./volumes/storage/rest-fastapi-orm-template/data:${FOT_API_DATA_DIR:-/var/lib/rest-fastapi-orm-template}"
    ports:
      - "${FOT_API_PORT:-8000}:${FOT_API_PORT:-8000}"
    tty: true
